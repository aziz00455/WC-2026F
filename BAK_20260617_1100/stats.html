<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>World Cup 2026 - Quick Stats</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; font-size:10pt; }

.topbar {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 20px; background:#fff; border-bottom:1px solid #ddd;
}

    .title {
      font-size: 14pt;
      font-weight: bold;
    }

button {
  font-size:10pt; padding:6px 10px;
  border:1px solid #bbb; background:#fff;
  border-radius:4px; cursor:pointer;
}

.page-wrap { max-width:1320px; margin:auto; padding:20px; }

.center-note {
  text-align:center; font-weight:bold; margin-bottom:16px;
  line-height:1.4;
}

table {
  width:95%; margin:auto;
  border-collapse:collapse;
  background:#fff;
  border:1px solid #ddd;
  table-layout:fixed;
}

th, td {
  padding:6px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th { background:#fafafa; font-weight:bold; }

.arrow { font-size:9px; margin-left:4px; }
.highlight { background:#fff6cc; }
.two-line { display:inline-block; line-height:1.1; }
</style>
</head>

<body>

<div class="topbar">
  <div class="title">World Cup 2026 - Quick Stats</div>
  <button onclick="goBack()">Return</button>
</div>

<div class="page-wrap">

<div class="center-note">
  FIFA Rank: Official FIFA/Coca-Cola Rank, June 11, 2026<br>
  Pick Score = Total Win Picks (x3) + Total Draw Picks (x1) + Total Loss Picks (x0)
</div>

<table>

<!-- ✅ NEW WIDTH CONTROL -->
<colgroup>
  <col style="width:7%">
  <col style="width:7%">
  <col style="width:20%">
  <col style="width:7%">
  <col style="width:7%">
  <col style="width:7%">
  <col style="width:7%">
  <col style="width:7%">
  <col style="width:7%">
  <col style="width:7%">
  <col style="width:7%">
</colgroup>

<thead>
<tr>

<th class="sortable" data-key="rank">
  <span class="two-line">FIFA<br>Rank</span>
  <span class="arrow">⇅</span>
</th>

<th class="sortable" data-key="pickRank">
  <span class="two-line">Pick<br>Rank</span>
  <span class="arrow">⇅</span>
</th>

<th>Team</th>

<th class="highlight">Points</th>
<th>W</th>
<th>D</th>
<th>L</th>

<th class="highlight">
  <span class="two-line">Pick<br>Score</span>
</th>

<th><span class="two-line">Picked as<br>Win %</span></th>
<th><span class="two-line">Picked as<br>Draw %</span></th>
<th><span class="two-line">Picked as<br>Loss %</span></th>

</tr>
</thead>

<tbody id="statsBody">
<tr><td colspan="11">Loading...</td></tr>
</tbody>

</table>

</div>

<script>
  window.global = window;
  window.process = window.process || { env: {} };
</script>


<script src="matches.js"></script>
<script src="FIFARank.js"></script>
<script src="fetchScores.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAYn3EvDLaUfxxxFx_2Y__5SvX-Z4m1G7Q",
  authDomain: "wc-2026f-prd.firebaseapp.com",
  projectId: "wc-2026f-prd",
  storageBucket: "wc-2026f-prd.firebasestorage.app",
  messagingSenderId: "1041886294433",
  appId: "1:1041886294433:web:b1372700d85644d0f59be0",
  measurementId: "G-KP1T2TYZYB"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function goBack(){ window.location.href="landing.html"; }

let sortKey="rank";
let sortDir="asc";
let masterRows=[];

function initRows(){
  const map={};
  fifaRank.forEach(r=>{
    map[r.team]={
      rank:r.rank, team:r.team,
      w:0,d:0,l:0,
      points:0,
      pickWin:0,pickDraw:0,pickLoss:0,
      pickScore:0,
      pickRank:0,
      pickWinPct:0,pickDrawPct:0,pickLossPct:0
    };
  });
  return map;
}

function applyResult(map,t1,t2,s1,s2){
  if (s1==null||s2==null) return;
  if(s1>s2){map[t1].w++;map[t2].l++;}
  else if(s1<s2){map[t2].w++;map[t1].l++;}
  else{map[t1].d++;map[t2].d++;}
}

async function load(){
  const map=initRows();

  const users=await db.collection("users").get();
  users.forEach(doc=>{
    const picks=doc.data().picks||[];
    matches.forEach((m,i)=>{
      const p=picks[i];
      if(!p) return;
      if(p===1){map[m.team1].pickWin++;map[m.team2].pickLoss++;}
      if(p===2){map[m.team2].pickWin++;map[m.team1].pickLoss++;}
      if(p===3){map[m.team1].pickDraw++;map[m.team2].pickDraw++;}
    });
  });

  if(window.syncPendingMatchResults){
    await window.syncPendingMatchResults(db,matches);
  }

  const doc=await db.collection("matchResults").doc("main").get();
  if(doc.exists){
    const results=doc.data().results||{};
    matches.forEach(m=>{
      const r=results[m.id];
      if(!r) return;
      applyResult(map,m.team1,m.team2,r.score1,r.score2);
    });
  }

  masterRows=Object.values(map);

  masterRows.forEach(r=>{
    r.points=r.w*3+r.d;
    r.pickScore=r.pickWin*3+r.pickDraw;

    const total=r.pickWin+r.pickDraw+r.pickLoss;
    if(total>0){
      r.pickWinPct=r.pickWin/total*100;
      r.pickDrawPct=r.pickDraw/total*100;
      r.pickLossPct=r.pickLoss/total*100;
    }
  });

  const sorted=[...masterRows].sort((a,b)=>b.pickScore-a.pickScore);
  let rank=0,last=null;
  sorted.forEach((r,i)=>{
    if(r.pickScore!==last){rank=i+1;last=r.pickScore;}
    r.pickRank=rank;
  });

  render();
}

function render(){
  const rows=[...masterRows].sort((a,b)=>{
    let v=a[sortKey]-b[sortKey];
    return sortDir==="asc"?v:-v;
  });

  const tbody=document.getElementById("statsBody");
  tbody.innerHTML="";

  rows.forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${r.rank}</td>
      <td>${r.pickRank}</td>
      <td>${r.team}</td>
      <td class="highlight">${r.points}</td>
      <td>${r.w}</td>
      <td>${r.d}</td>
      <td>${r.l}</td>
      <td class="highlight">${r.pickScore}</td>
      <td>${r.pickWinPct.toFixed(1)}%</td>
      <td>${r.pickDrawPct.toFixed(1)}%</td>
      <td>${r.pickLossPct.toFixed(1)}%</td>
    `;
    tbody.appendChild(tr);
  });

  updateArrows();
}

function updateArrows(){
  document.querySelectorAll(".sortable").forEach(th=>{
    const key=th.dataset.key;
    const arrow=th.querySelector(".arrow");
    arrow.textContent=(key===sortKey)
      ? (sortDir==="asc"?"▲":"▼")
      : "⇅";
  });
}

document.querySelectorAll(".sortable").forEach(th=>{
  th.onclick=()=>{
    const key=th.dataset.key;
    if(sortKey===key){sortDir=sortDir==="asc"?"desc":"asc";}
    else{sortKey=key;sortDir="asc";}
    render();
  };
});

load();
</script>

</body>
</html>
