<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>World Cup 2026 - Leaderboard</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; font-size: 10pt; }

    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; background: white; border-bottom: 1px solid #ddd;
      position: sticky; top: 0;
    }

    .title { font-size: 14pt; font-weight: bold; }
    .top-buttons { display: flex; gap: 8px; }

    button {
      font-size: 10pt; padding: 6px 10px;
      border: 1px solid #bbb; background: #fff;
      border-radius: 4px; cursor: pointer;
    }

    .page-wrap { max-width: 1000px; margin: auto; padding: 20px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #ddd;
      table-layout: fixed;
    }

    th, td {
      padding: 6px;
      border-bottom: 1px solid #eee;
      font-size: 10pt;
      text-align: center;
    }

    th { background: #fafafa; }

    /* ✅ column sizing */
    th:nth-child(1), td:nth-child(1) { width: 45px; }

    th:nth-child(2), td:nth-child(2) {
      width: 220px;
      text-align: left;
      padding-left: 10px;
      white-space: nowrap;
    }

    th:nth-child(3), td:nth-child(3) { width: 60px; }
    th:nth-child(4), td:nth-child(4) { width: 70px; }
    th:nth-child(5), td:nth-child(5) { width: 70px; }
    th:nth-child(6), td:nth-child(6) { width: 70px; }
    th:nth-child(7), td:nth-child(7) { width: 90px; }

    .score-col { background: #fff7cc; font-weight: bold; }

    tr.my-row { background: #d8e9ff; font-weight: bold; }

    a {
      color: #1a73e8;
      text-decoration: none;
    }

    .matches-completed {
      margin-bottom: 10px;
      text-align: right;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="title">World Cup 2026 - Leaderboard</div>
  <div class="top-buttons">
    <button onclick="goToStats()">Stats</button>
    <button onclick="goToChat()">Chat</button>
    <button onclick="goToGame()">Pick</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="page-wrap">
  <div id="matchesCompleted" class="matches-completed"></div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Picks</th>
        <th class="score-col">Score</th>
        <th>Correct<br>(+1 pt)</th>
        <th>Incorrect<br>(0 pt)</th>
        <th>Not Picked<br>(-0.25 pt)</th>
      </tr>
    </thead>
    <tbody id="leaderboardBody"></tbody>
  </table>
</div>

<script>
  window.global = window;
  window.process = window.process || { env: {} };
</script>

<script>
const firebaseConfig = {

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userId = localStorage.getItem("userId");

function goToGame(){ window.location.href="game.html"; }
function goToChat(){ window.location.href="chat.html"; }
function goToStats(){ window.location.href="stats.html"; }
function logout(){
  localStorage.removeItem("userId");
  window.location.href="index.html";
}

/* =========================
   LEADERBOARD LOGIC
========================= */

function buildResultsMap(summary) {
  const map = summary.results || {};
  let completed = 0;

  Object.values(map).forEach(d => {
    if (d?.status === "completed") completed++;
  });

  return { map, completed };
}

function buildStats(usersSnap, resultsMap) {

  const stats = {};

  usersSnap.forEach(doc => {

    const data = doc.data();
    const picks = data.picks || new Array(73).fill(0);

    stats[doc.id] = {
      picks: picks[72] || 0,
      correct: 0,
      incorrect: 0,
      pending: 0,
      completed: 0,
      score: 0
    };

    for (let i = 0; i < 72; i++) {

      if (!picks[i]) continue;

      const result = resultsMap[matches[i].id];

      if (!result || result.status !== "completed") {
        stats[doc.id].pending++;
        continue;
      }

      stats[doc.id].completed++;

      const predicted =
        picks[i] === 1 ? "team1" :
        picks[i] === 2 ? "team2" : "tie";

      if (predicted === result.outcome) {
        stats[doc.id].correct++;
        stats[doc.id].score++;
      } else {
        stats[doc.id].incorrect++;
      }
    }
  });

  return stats;
}

function render(rows) {

  const tbody = document.getElementById("leaderboardBody");
  tbody.innerHTML = "";

  let rank = 0;
  let lastScore = null;

  rows.forEach((r, i) => {

    if (r.score !== lastScore) {
      rank = i + 1;
      lastScore = r.score;
    }

    const tr = document.createElement("tr");

    if (r.uid === userId) {
      tr.classList.add("my-row");
    }

    const nameLink =
      r.uid === userId
        ? `<a href="game.html">${r.name}</a>`
        : `<a href="showpick.html?uid=${r.uid}&name=${encodeURIComponent(r.name)}">${r.name}</a>`;

    tr.innerHTML = `
      <td>${rank}</td>
      <td>${nameLink}</td>
      <td>${r.picks}</td>
      <td class="score-col">${r.score}</td>
      <td>${r.correct}</td>
      <td>${r.incorrect}</td>
      <td>${r.notPicked}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* =========================
   LOAD FLOW (SIMPLE)
========================= */

async function load() {

  // ✅ FULL SYNC handled by fetchScores.js
  const syncResult = await syncPendingMatchResults(db, matches);

  console.log("Sync:", syncResult);

  const [usersSnap, summaryDoc] = await Promise.all([
    db.collection("users").get(),
    db.collection("matchResults").doc("main").get()
  ]);

  const summary = summaryDoc.exists ? summaryDoc.data() : { results: {} };

  const { map, completed } = buildResultsMap(summary);
  const stats = buildStats(usersSnap, map);

  document.getElementById("matchesCompleted").textContent =
    `Matches Completed: ${completed} / 72`;

  const rows = [];

  usersSnap.forEach(doc => {

    const s = stats[doc.id];
    const notPicked = completed - s.completed;
    const finalScore = s.score + (notPicked * -0.25);

    rows.push({
      uid: doc.id,
      name: doc.data().username,
      picks: s.picks,
      correct: s.correct,
      incorrect: s.incorrect,
      notPicked,
      score: Number(finalScore.toFixed(2))
    });
  });

  rows.sort((a, b) => b.score - a.score);

  render(rows);
}

load();
</script>

</body>
</html>
