<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>World Cup 2026 - My Predictions</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
      font-size: 10pt;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      font-size: 14pt;
      font-weight: bold;
    }

    .top-buttons {
      display: flex;
      gap: 8px;
    }

    button {
      font-size: 10pt;
      padding: 6px 10px;
      cursor: pointer;
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 4px;
    }

    button:hover:not(:disabled) {
      background: #f0f0f0;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .page-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px 32px 14px;
    }

    .date-section {
      margin-bottom: 24px;
    }

    .date-heading {
      font-size: 14pt;
      font-weight: bold;
      margin: 8px 0 12px 0;
    }

    .group-heading {
      font-size: 10pt;
      font-weight: bold;
      margin: 10px 0 8px 0;
      color: #333;
    }

    .match-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
    }
    
    .match-card.correct {
      background: #e6f4ea;  /* light green */
    }

    .match-card.wrong {
      background: #fdecea;  /* light red */
    }

    .match-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .match-time {
      color: #444;
      white-space: nowrap;
    }

    .teams-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 170px;
      justify-content: center;
    }

    .flag {
      width: 22px;
      height: 16px;
      object-fit: cover;
      border: 1px solid #ccc;
      border-radius: 2px;
      background: #fff;
      flex-shrink: 0;
    }

    .vs {
      color: #666;
      font-weight: bold;
      min-width: 24px;
      text-align: center;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pick-btn.selected {
      background: #d8e9ff;
      border-color: #5c92d9;
      font-weight: bold;
    }

    .status-line {
      margin-top: 10px;
      text-align: center;
      color: #666;
    }

    .status-line.locked {
      color: #b00000;
    }

    .status-line.saved {
      color: #006400;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="title">World Cup 2026 - My Predictions</div>

  <div class="top-buttons">
    <button onclick="goBack()">Save My Predictions</button>
  </div>
</div>

<div class="page-wrap" id="app"></div>

<script>
  window.global = window;
  window.process = window.process || { env: {} };
</script>

<script src="matches.js"></script>
<script src="teamFlag.js"></script>
<script src="fetchScores.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAYn3EvDLaUfxxxFx_2Y__5SvX-Z4m1G7Q",
  authDomain: "wc-2026f-prd.firebaseapp.com",
  projectId: "wc-2026f-prd",
  storageBucket: "wc-2026f-prd.firebasestorage.app",
  messagingSenderId: "1041886294433",
  appId: "1:1041886294433:web:b1372700d85644d0f59be0",
  measurementId: "G-KP1T2TYZYB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userId = localStorage.getItem("userId");
if (!userId) window.location.href = "index.html";

function goBack() {
  window.location.href = "landing.html";
}

// helpers unchanged
function formatPrettyDate(dateStr){
  const dt = new Date(dateStr + "T00:00:00");
  return dt.toLocaleDateString("en-US",{
    weekday:"long", year:"numeric", month:"long", day:"numeric"
  });
}

function isLocked(match){
  const kickoff = new Date(match.kickoffEdt).getTime();
  return Date.now() >= kickoff - (60 * 60 * 1000);
}

function groupMatchesByDate(data){
  const map = {};
  data.forEach(m => {
    if (!map[m.date]) map[m.date] = [];
    map[m.date].push(m);
  });

  Object.keys(map).forEach(date => {
    map[date].sort((a,b) => {
      if (a.group !== b.group) return a.group.localeCompare(b.group);
      if (a.time !== b.time) return a.time.localeCompare(b.time);
      return a.id.localeCompare(b.id);
    });
  });

  return map;
}

function pickIntToChoice(v){ return v===1 ? "team1" : v===2 ? "team2" : v===3 ? "tie" : null; }
function choiceToPickInt(c){ return c==="team1" ? 1 : c==="team2" ? 2 : c==="tie" ? 3 : 0; }
function getMatchIndex(id){ return matches.findIndex(m => m.id === id); }

// user picks (unchanged)
async function loadUserPredictions(){
  const doc = await db.collection("users").doc(userId).get();
  if (!doc.exists) return new Array(73).fill(0);
  const d = doc.data();
  return Array.isArray(d.picks) ? d.picks : new Array(73).fill(0);
}

async function savePrediction(matchId, choice){
  const docRef = db.collection("users").doc(userId);
  const doc = await docRef.get();

  let picks = new Array(73).fill(0);

  if (doc.exists){
    const d = doc.data();
    if (Array.isArray(d.picks) && d.picks.length === 73){
      picks = [...d.picks];
    }
  }

  const idx = getMatchIndex(matchId);
  if (idx < 0) return;

  const newVal = choiceToPickInt(choice);
  const oldVal = picks[idx] || 0;

  if (oldVal === 0 && newVal !== 0) picks[72] = (picks[72] || 0) + 1;
  else if (oldVal !== 0 && newVal === 0) picks[72] = Math.max((picks[72] || 0) - 1, 0);

  picks[idx] = newVal;
  await docRef.set({ picks: picks }, { merge:true });
}

// render
async function render(){

  const app = document.getElementById("app");
  app.innerHTML = "";

  const savedPredictions = await loadUserPredictions();
  const byDate = groupMatchesByDate(matches);
  const dates = Object.keys(byDate).sort();

  const summaryDoc = await db.collection("matchResults").doc("main").get();
  const matchResults = summaryDoc.exists
    ? (summaryDoc.data().results || {})
    : {};

  dates.forEach(date => {

    const section = document.createElement("div");
    section.className = "date-section";

    const heading = document.createElement("div");
    heading.className = "date-heading";
    heading.textContent = formatPrettyDate(date);
    section.appendChild(heading);

    let currentGroup = null;

    byDate[date].forEach(match => {

      if (match.group !== currentGroup){
        currentGroup = match.group;
        const g = document.createElement("div");
        g.className = "group-heading";
        g.textContent = "Group " + currentGroup;
        section.appendChild(g);
      }

      const resultDoc = matchResults[match.id];
      const locked = isLocked(match);
      const idx = getMatchIndex(match.id);
      const existingPick = pickIntToChoice(savedPredictions[idx]);

      let displayTime = "Kickoff: " + match.time;
      if (resultDoc && resultDoc.status === "completed") {
        displayTime = "Final";
      }

      const card = document.createElement("div");
      card.className = "match-card";

      if (resultDoc && resultDoc.status === "completed"){
        if (!existingPick) card.classList.add("wrong");
        else if (resultDoc.outcome === existingPick) card.classList.add("correct");
        else card.classList.add("wrong");
      }

      card.innerHTML = `
        <div class="match-top">
          <div><strong>Group ${match.group}</strong></div>
          <div class="match-time">${displayTime} EDT</div>
        </div>

        <div class="teams-row">
          <div class="team">
            <img class="flag" src="${getTeamFlagUrl(match.team1)}">
            ${match.team1}
          </div>

          <div class="vs">${
            resultDoc && resultDoc.status === "completed"
              ? resultDoc.score1 + " - " + resultDoc.score2
              : "vs"
          }</div>

          <div class="team">
            <img class="flag" src="${getTeamFlagUrl(match.team2)}">
            ${match.team2}
          </div>
        </div>

        <div class="actions">
          <button class="pick-btn ${existingPick==="team1"?"selected":""}" ${locked?"disabled":""} data-choice="team1">${match.team1}</button>
          <button class="pick-btn ${existingPick==="tie"?"selected":""}" ${locked?"disabled":""} data-choice="tie">Tie</button>
          <button class="pick-btn ${existingPick==="team2"?"selected":""}" ${locked?"disabled":""} data-choice="team2">${match.team2}</button>
        </div>
      `;

      const status = document.createElement("div");
      status.className = "status-line";

      if (locked){
        status.classList.add("locked");
        const label = existingPick==="team1" ? match.team1 : existingPick==="team2" ? match.team2 : "Tie";
        status.textContent = existingPick
          ? "Locked — You picked: " + label
          : "Locked — You did not pick";
      } else if (existingPick){
        status.classList.add("saved");
        const label = existingPick==="team1" ? match.team1 : existingPick==="team2" ? match.team2 : "Tie";
        status.textContent = "You picked: " + label;
      } else {
        status.textContent = "You can change your selection until 1 hour before kickoff.";
      }

      card.appendChild(status);

      const buttons = card.querySelectorAll(".pick-btn");

      buttons.forEach(btn => {
        if (!locked){
          btn.addEventListener("click", async () => {
            const choice = btn.getAttribute("data-choice");
            buttons.forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
            await savePrediction(match.id, choice);

            status.className = "status-line saved";
            status.textContent = "Saved pick: " + (
              choice==="team1" ? match.team1 :
              choice==="team2" ? match.team2 : "Tie"
            );
          });
        }
      });

      section.appendChild(card);
    });

    app.appendChild(section);
  });
}

async function loadPage(){
  try {
    await syncPendingMatchResults(db, matches);
  } catch (e) {
    console.error("syncPendingMatchResults failed:", e);
  }

  await render();
}

loadPage();
</script>

</body>
</html>
