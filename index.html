<!DOCTYPE html>
<html>
<head>
  <title>WC-2026 Login</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 260px;
    }

    input {
      width: 200px;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 224px;
      padding: 10px;
      margin: 8px 0; 
      cursor: pointer;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>WC-2026</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password (something simple)">
  <button onclick="login()">Login</button>
  <button onclick="createUser()">Create User</button>
  <div id="message"></div>
</div>


<!-- ✅ SIMPLE FIREBASE (NO MODULES) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

	const firebaseConfig = {
  apiKey: "AIzaSyAYn3EvDLaUfxxxFx_2Y__5SvX-Z4m1G7Q",
  authDomain: "wc-2026f-prd.firebaseapp.com",
  projectId: "wc-2026f-prd",
  storageBucket: "wc-2026f-prd.firebasestorage.app",
  messagingSenderId: "1041886294433",
  appId: "1:1041886294433:web:b1372700d85644d0f59be0",
  measurementId: "G-KP1T2TYZYB"
	};

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();


  function login() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("message");

    if (!username || !password) {
      msg.innerText = "Enter username and password";
      return;
    }

    db.collection("users")
      .where("username", "==", username)
      .where("password", "==", password)
      .get()
      .then(snapshot => {

        if (!snapshot.empty) {
          localStorage.setItem("userId", snapshot.docs[0].id);
          msg.style.color = "green";
          msg.innerText = "Login success";
          window.location.href = "rules.html";
        } else {
          msg.style.color = "red";
          msg.innerText = "Invalid login";
        }

      });
  }


  function createUser() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("message");

    if (!username || !password) {
      msg.innerText = "Enter username and password";
      return;
    }

    db.collection("users")
      .where("username", "==", username)
      .get()
      .then(snapshot => {

        if (!snapshot.empty) {
          msg.innerText = "Username exists";
          return;
        }


	const picks = new Array(73).fill(0);

	db.collection("users").add({
	  username: username,
	  password: password,
	  total_score: null,
	  seed: null,
	  picks: picks
	});


        msg.style.color = "green";
        msg.innerText = "User created. Click Login";

      });
  }

</script>

</body>
</html>
