<head>

<style>

<body>


<div class="topbar">
  <div class="title">World Cup 2026 - Chat</div>

  <div class="top-buttons">
    <button onclick="goBack()">Return</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>



<div class="page-wrap">

  <div id="chatBox" class="chat-box"></div>

  <div class="input-row">

    <div class="input-line">
      <input id="msgInput" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <!-- ✅ NEW MESSAGE INDICATOR HERE -->
    <div id="newMsgBar" class="new-message-bar">
      New message ↓
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAYn3EvDLaUfxxxFx_2Y__5SvX-Z4m1G7Q",
  authDomain: "wc-2026f-prd.firebaseapp.com",
  projectId: "wc-2026f-prd",
  storageBucket: "wc-2026f-prd.firebasestorage.app",
  messagingSenderId: "1041886294433",
  appId: "1:1041886294433:web:b1372700d85644d0f59be0",
  measurementId: "G-KP1T2TYZYB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userId = localStorage.getItem("userId");
if (!userId) window.location.href = "index.html";

function goBack() {
  window.location.href = "landing.html";
}

let oldestDoc = null;
let loadingOlder = false;
let noMoreMessages = false;
let unsubscribe = null;
let isAtBottom = true;

// ✅ format time
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString([], {
    month:"short",
    day:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

// ✅ render message
function addMessage(m, container, prepend=false) {

  const div = document.createElement("div");
  div.className = "message";

  if (m.userId === userId) div.classList.add("right");
  else div.classList.add("left");

  div.innerHTML = `
    <div>
      <span class="name">${m.username}</span>
      <span class="time">${formatTime(m.timestamp)}</span>
    </div>
    <div class="text">${m.text}</div>
  `;

  if (prepend) container.prepend(div);
  else container.appendChild(div);
}

// ✅ send message
async function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text) return;

  const doc = await db.collection("users").doc(userId).get();
  const username = doc.exists ? doc.data().username : "User";

  await db.collection("chatMessages").add({
    userId,
    username,
    text,
    timestamp: Date.now()
  });

  input.value = "";
}

// ✅ enter key
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("msgInput").addEventListener("keypress", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });
});

function get24hAgo() {
  return Date.now() - 7*24*60*60*1000;
}

// ✅ LISTENER
function startListener() {

  unsubscribe = db.collection("chatMessages")
    .where("timestamp", ">=", get24hAgo())
    .orderBy("timestamp", "desc")
    .limit(30)
    .onSnapshot(snapshot => {

      const box = document.getElementById("chatBox");

      const atBottomBefore = isAtBottom;

      box.innerHTML = "";

      const messages = [];

      snapshot.forEach(doc => {
        messages.push({ data:doc.data(), id:doc.id });
      });

      messages.reverse();

      if (messages.length > 0) {
        oldestDoc = messages[0].id;
      }

      messages.forEach(m => addMessage(m.data, box));

      if (atBottomBefore) {
        box.scrollTop = box.scrollHeight;
      } else {
        // ✅ SHOW indicator
        document.getElementById("newMsgBar").style.display = "block";
      }

    });
}

// ✅ click indicator
document.getElementById("newMsgBar").onclick = () => {
  const box = document.getElementById("chatBox");
  box.scrollTop = box.scrollHeight;
  document.getElementById("newMsgBar").style.display = "none";
};

// ✅ scroll handling
document.addEventListener("DOMContentLoaded", () => {

  const box = document.getElementById("chatBox");

  box.addEventListener("scroll", () => {

    const nearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 30;
    isAtBottom = nearBottom;

    if (nearBottom) {
      document.getElementById("newMsgBar").style.display = "none";
    }

    if (box.scrollTop <= 2) {
      loadOlder();
    }

  });

});


function logout() {
  localStorage.removeItem("userId");
  window.location.href = "index.html";
}


// ✅ load older (unchanged)
async function loadOlder() {

  if (!oldestDoc || loadingOlder || noMoreMessages) return;

  loadingOlder = true;

  const box = document.getElementById("chatBox");
  const prevHeight = box.scrollHeight;

  const loadingDiv = document.createElement("div");
  loadingDiv.className = "loading";
  loadingDiv.textContent = "Loading older messages...";
  box.prepend(loadingDiv);

  const start = Date.now();

  const docRef = await db.collection("chatMessages").doc(oldestDoc).get();

  const snapshot = await db.collection("chatMessages")
    .where("timestamp", ">=", get24hAgo())
    .orderBy("timestamp", "desc")
    .startAfter(docRef)
    .limit(10)
    .get();

  const elapsed = Date.now() - start;
  if (elapsed < 1000) {
    await new Promise(res => setTimeout(res, 1000 - elapsed));
  }

  loadingDiv.remove();

  if (snapshot.empty) {
    noMoreMessages = true;

    const endDiv = document.createElement("div");
    endDiv.className = "loading";
    endDiv.textContent = "All previous messages are deleted";
    box.prepend(endDiv);

    loadingOlder = false;
    return;
  }

  const messages = [];

  snapshot.forEach(doc => {
    messages.push({ data:doc.data(), id:doc.id });
  });

  messages.reverse();

  for (let i = messages.length - 1; i >= 0; i--) {
    addMessage(messages[i].data, box, true);
  }

  box.scrollTop = box.scrollHeight - prevHeight;

  oldestDoc = messages[0].id;

  loadingOlder = false;
}

// ✅ pause/resume
document.addEventListener("visibilitychange", () => {
  if (document.hidden && unsubscribe) unsubscribe();
  else startListener();
});

// ✅ init
startListener();

</script>

</body>
</html>
